name: Build ImageMerger Win7 EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.8 x86
        uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'
          architecture: 'x86'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-win7.txt

      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --windowed --name ImageMerger_Win7 image_merger_win7.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageMerger_Win7_EXE
          path: dist/ImageMerger_Win7.exe
